version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: handover_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: handover_user
      POSTGRES_PASSWORD: handover_pass
      POSTGRES_DB: handover_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: